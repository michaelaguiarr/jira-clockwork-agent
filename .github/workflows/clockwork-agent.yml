name: Clockwork Agent

on:
  schedule:
    # 18h BRT (= 21h UTC) — lembrete para lançar eventos no Calendar
    - cron: "0 21 * * 1-5"
    # 20h BRT (= 23h UTC) — lança worklogs + verifica horas faltantes
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

jobs:
  log-hours:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar agente
        env:
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          START_DATE: ${{ secrets.START_DATE }}
          LOOKBACK_DAYS: ${{ secrets.LOOKBACK_DAYS }}
          DAILY_HOURS_GOAL: ${{ secrets.DAILY_HOURS_GOAL }}
          FORCE_MODE: ${{ secrets.FORCE_MODE }}
          FORCE_MONTHLY: ${{ secrets.FORCE_MONTHLY }}
        run: python src/agent.py

      - name: Commitar controle de duplicatas
        run: |
          git config user.name  "clockwork-agent[bot]"
          git config user.email "clockwork-agent@users.noreply.github.com"
          git add logged_worklogs.json
          git diff --staged --quiet || git commit -m "chore: atualiza worklogs lançados [skip ci]"
          git push
