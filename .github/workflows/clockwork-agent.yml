name: Clockwork Agent

on:
  schedule:
    # Teste temporário — 08h40 BRT (= 11h40 UTC)
    - cron: "40 11 * * *"
    # Teste — 09h30 BRT (= 12h30 UTC)
    - cron: "30 12 * * *"
    # 18h02 BRT (= 21h02 UTC) — lembrete para lançar eventos no Calendar
    - cron: "2 21 * * 1-5"
    # 23h32 BRT (= 02h32 UTC) — lança worklogs + verifica horas faltantes
    - cron: "32 2 * * 2-6"
  workflow_dispatch:

jobs:
  log-hours:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar agente
        env:
          TZ: "America/Sao_Paulo" # <-- Força o fuso horário de Brasília na máquina
          JIRA_DOMAIN:             ${{ secrets.JIRA_DOMAIN }}
          JIRA_EMAIL:              ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:          ${{ secrets.JIRA_API_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CHAT_WEBHOOK:     ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          START_DATE:              ${{ secrets.START_DATE }}
          LOOKBACK_DAYS:           ${{ secrets.LOOKBACK_DAYS }}
          DAILY_HOURS_GOAL:        ${{ secrets.DAILY_HOURS_GOAL }}
          FORCE_MODE:              ${{ secrets.FORCE_MODE }}
          FORCE_MONTHLY:           ${{ secrets.FORCE_MONTHLY }}
        run: python src/agent.py

      - name: Commitar arquivos de controle
        run: |
          git config user.name  "clockwork-agent[bot]"
          git config user.email "clockwork-agent@users.noreply.github.com"
          git add logged_worklogs.json health.json
          git diff --staged --quiet || git commit -m "chore: atualiza worklogs e health check [skip ci]"
          git push
