name: Clockwork Agent

on:
  schedule:
    # Roda a cada 30 minutos — o agente decide o que fazer baseado na hora BRT:
    # 18h00–18h59 BRT → lembrete
    # 23h30–00h29 BRT → lançamento
    # outros horários → encerra silenciosamente
    - cron: "0,30 * * * 1-5"
  workflow_dispatch:

jobs:
  log-hours:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar agente
        env:
          JIRA_DOMAIN:             ${{ secrets.JIRA_DOMAIN }}
          JIRA_EMAIL:              ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:          ${{ secrets.JIRA_API_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CHAT_WEBHOOK:     ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          START_DATE:              ${{ secrets.START_DATE }}
          LOOKBACK_DAYS:           ${{ secrets.LOOKBACK_DAYS }}
          DAILY_HOURS_GOAL:        ${{ secrets.DAILY_HOURS_GOAL }}
          FORCE_MODE:              ${{ secrets.FORCE_MODE }}
          FORCE_MONTHLY:           ${{ secrets.FORCE_MONTHLY }}
        run: python src/agent.py

      - name: Commitar arquivos de controle
        run: |
          git config user.name  "clockwork-agent[bot]"
          git config user.email "clockwork-agent@users.noreply.github.com"
          git add logged_worklogs.json health.json
          git diff --staged --quiet || git commit -m "chore: atualiza worklogs e health check [skip ci]"
          git push
